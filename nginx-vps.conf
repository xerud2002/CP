# Redirect www, .ro variants, and bare IP to canonical domain
server {
    listen 443 ssl;
    server_name www.curierulperfect.com curierulperfect.ro www.curierulperfect.ro 87.106.143.64;

    ssl_certificate /etc/letsencrypt/live/curierulperfect.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/curierulperfect.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://curierulperfect.com$request_uri;
}

# Main site - canonical domain only
server {
    listen 443 ssl;
    server_name curierulperfect.com;

    ssl_certificate /etc/letsencrypt/live/curierulperfect.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/curierulperfect.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Serve static files from public folder directly
    location /service-worker.js {
        alias /root/curierul-perfect/public/service-worker.js;
        add_header Content-Type application/javascript;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location /manifest.json {
        alias /root/curierul-perfect/public/manifest.json;
        add_header Content-Type application/json;
    }

    location /img/ {
        alias /root/curierul-perfect/public/img/;
    }

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# HTTP to HTTPS redirect for all variants
server {
    listen 80;
    server_name curierulperfect.com www.curierulperfect.com curierulperfect.ro www.curierulperfect.ro 87.106.143.64;
    return 301 https://curierulperfect.com$request_uri;
}
